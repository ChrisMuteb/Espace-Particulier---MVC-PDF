<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<main class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 th:text="'Déclaration ' + ${tax.year}"></h3>
        </div>
        <div class="card-body">
            <p><strong>Bénéficiaire :</strong> <span th:text="${tax.fullName}"></span></p>
            <p><strong>Numéro Fiscal :</strong> <span th:text="${tax.fiscalNumber}"></span></p>
            <hr>
            <div class="alert alert-info">
                Revenu imposable : <span th:text="${tax.annualIncome} + ' €'"></span>
            </div>

            <a th:href="@{/tax-download}" class="btn btn-danger">
                <i class="bi bi-file-earmark-pdf"></i> Télécharger ma déclaration (PDF)
            </a>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
